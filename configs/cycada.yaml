# CyCada hyperparameter configuration
# These values can be overridden via command-line arguments in train_cycada.py

# Training duration
epochs: 200

# Optimiser
lr: 0.0002
betas: [0.5, 0.999]

# Loss weights
lambda_gan: 1.0
lambda_cyc: 10.0
# Identity loss weight (0.0 = disabled; typically 5.0 when used)
lambda_idt: 0.0
# Semantic consistency loss weight (> 0 enables DeepLabV3-backed semantic regularisation)
lambda_sem: 1.0

# Data loading
batch_size: 1
patch_size: 128
# Resize images so the shortest side equals this value (pixels) before detection training/eval
resize_min_side: 600

# Hardware
device: cuda

# Replay buffer
# Size of 50 and return probability of 0.5 match the original CycleGAN paper (Zhu et al., 2017)
buffer_size: 50
buffer_return_prob: 0.5

# Discriminator loss averaging factor (weights real and fake losses equally)
disc_loss_avg_factor: 0.5

# Logging interval (iterations between loss log lines)
log_interval: 100
